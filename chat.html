<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>聊天助手</title>

<style>

body{
font-family: Arial;
background:#eeeeee;
text-align:center;
}

h1{
margin-top:30px;
}

#chat{
width:90%;
max-width:600px;
height:400px;
background:white;
margin:auto;
border-radius:10px;
padding:10px;
overflow:auto;
border:1px solid gray;
}

#input{
width:70%;
height:40px;
font-size:18px;
margin-top:10px;
}

button{
height:45px;
font-size:18px;
}

</style>

</head>



<body>

<h1>聊天助手</h1>

<div id="chat">

<p>聊天系统已启动</p>

</div>

<br>

<input id="input" placeholder="输入文字">

<button onclick="send()">发送</button>


<script>

async function send(){

var input=document.getElementById("input");
var chat=document.getElementById("chat");

var text=input.value;

if(text=="") return;

chat.innerHTML += "<p>你："+text+"</p >";

input.value="";

chat.scrollTop=chat.scrollHeight;



const response = await fetch(
"https://api.openai.com/v1/chat/completions",
{
method:"POST",

headers:{
"Content-Type":"application/json",

"Authorization":"Bearer sk-proj-3tlJzU"
},

body:JSON.stringify({

model:"gpt-4o-mini",

messages:[
{role:"user",content:text}
]

})

}

);


const data=await response.json();

const reply=data.choices[0].message.content;

chat.innerHTML += "<p>AI："+reply+"</p >";

chat.scrollTop=chat.scrollHeight;

}

</script>

</body>

</html>
